name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        # lock 파일 유무에 따라 유연하게 설치
        run: |
          if [ -f "yarn.lock" ]; then
            yarn install
          else
            npm install --legacy-peer-deps
          fi

      - name: Build Contentlayer & Next.js
        # Next.js 16의 Turbopack과 Contentlayer의 Webpack 설정 충돌을 방지하기 위해 --webpack 명시
        run: |
          npx contentlayer2 build
          npx next build --webpack
        env:
          EXPORT: 1
          UNOPTIMIZED: 1

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4