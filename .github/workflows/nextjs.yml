name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  # 기존 배포를 취소하지 않고 순차적으로 완료하여 교체 시점의 404를 방지합니다.
  cancel-in-progress: false 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # 'lock file not found' 에러 방지를 위해 cache 옵션을 제거했습니다.

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          npm config set fetch-retries 5
          # lock 파일이 없거나 환경이 변해도 문제없도록 legacy-peer-deps로 설치합니다.
          npm install --legacy-peer-deps

      - name: Build Contentlayer & Next.js
        # 빌드 명령어 중 하나라도 실패하면 다음 단계(Upload)로 가지 않도록 &&를 사용합니다.
        run: |
          npx contentlayer2 build && npx next build --webpack
        env:
          EXPORT: 1
          UNOPTIMIZED: 1

      - name: Upload artifact
        # 빌드가 100% 성공(success)했을 때만 아티팩트를 생성하여 배포 준비를 합니다.
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    # Build 작업이 성공했을 때만 실행됩니다. 
    # 실패 시 이 단계는 Skipped 처리되어 기존 사이트가 유지됩니다.
    if: success()
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4