name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 배포 안정성을 위해 concurrency 설정을 최적화합니다.
concurrency:
  group: "pages"
  cancel-in-progress: false # 기존 배포를 취소하지 않고 순차적으로 처리하여 404 방지

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          npm config set fetch-retries 5
          npm install --legacy-peer-deps

      - name: Build Contentlayer & Next.js
        # &&를 사용해 빌드가 실패하면 즉시 중단되게 합니다.
        run: |
          npx contentlayer2 build && npx next build --webpack
        env:
          EXPORT: 1
          UNOPTIMIZED: 1

      - name: Upload artifact
        # 빌드에 성공했을 때만 아티팩트를 생성합니다.
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    # 핵심: 빌드가 '완벽하게 성공'했을 때만 배포 작업을 시작합니다.
    # 만약 빌드 중 MDX 에러가 나면 이 단계는 자동으로 건너뛰어지고 기존 사이트가 유지됩니다.
    if: success()
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4