name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # 잠시 캐시 기능을 끄고 진행하여 lock 파일 에러를 우회합니다.
          # cache: 'yarn' (이 부분이 에러의 원인이었습니다)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        # yarn.lock이 있다면 yarn을, 없다면 npm을 사용하도록 처리
        run: |
          if [ -f "yarn.lock" ]; then
            yarn install
          else
            npm install --legacy-peer-deps
          fi

      - name: Build Contentlayer & Next.js
        run: |
          # npx를 사용하여 설치된 패키지의 실행 파일을 직접 호출
          npx contentlayer2 build
          npx next build
        env:
          EXPORT: 1
          UNOPTIMIZED: 1

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4