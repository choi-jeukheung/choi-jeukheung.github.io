name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # 캐시 설정을 명시적으로 npm으로 지정하거나, 에러가 반복되면 아예 삭제하세요.
          cache: "npm"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        # 네트워크 안정성을 위해 재시도 설정을 추가하고 npm install로 단일화합니다.
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm install --legacy-peer-deps

      - name: Build Contentlayer & Next.js
        # MDX 파일 에러가 나면 여기서 멈추므로, 로컬에서 tofu-fried-rice.mdx 수정 확인 필수!
        run: |
          npx contentlayer2 build
          npx next build
        env:
          EXPORT: 1
          UNOPTIMIZED: 1

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4