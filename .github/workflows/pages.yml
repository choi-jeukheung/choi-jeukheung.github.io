name: GitHub Pages (Atomic Deploy)

on:
  push:
    branches: [main]   # main에 push하면 자동 배포됨
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn

      - name: Build Next.js static site
        run: |
          yarn build
        env:
          EXPORT: 1
          UNOPTIMIZED: 1
          BASE_PATH: "" # Pages 설정에 따라 base path 사용 안 함

      - name: Deploy to GitHub Pages (Atomic)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages      # Pages에서 이 브랜치를 사용하도록 설정해야 함
          publish_dir: ./out            # next export 결과물
          enable_jekyll: false